name: Security Review (Gemini API Key)

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: security-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security_review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Compute PR diff (limited)
        id: diff
        shell: bash
        run: |
          set -euo pipefail

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # List changed files for context
          git diff --name-only "$BASE" "$HEAD" | sed 's/^/- /' > changed_files.txt

          # Unified diff, excluding common noisy/binary files
          git diff --unified=3 "$BASE" "$HEAD" \
            -- . \
            ':(exclude)**/*.lock' \
            ':(exclude)**/package-lock.json' \
            ':(exclude)**/pnpm-lock.yaml' \
            ':(exclude)**/yarn.lock' \
            ':(exclude)**/*.png' \
            ':(exclude)**/*.jpg' \
            ':(exclude)**/*.jpeg' \
            ':(exclude)**/*.gif' \
            ':(exclude)**/*.pdf' \
            > pr.diff || true

          # Limit size to reduce request size
          MAX=120000
          tail -c "$MAX" pr.diff > pr_truncated.diff || cp pr.diff pr_truncated.diff

      - name: Security review with Gemini (API key)
        id: gemini
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: |
          set -euo pipefail

          if [[ -z "${GEMINI_API_KEY:-}" ]]; then
            echo "GEMINI_API_KEY not available (fork PR or missing secret) -- skipping AI security review."
            {
              DELIM=$(uuidgen)
              echo "review<<${DELIM}"
              echo "_Security review skipped: GEMINI_API_KEY secret not available. This is expected for fork PRs._"
              echo "${DELIM}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Read diff material from files written by the previous step.
          # Never use GitHub Actions expression interpolation for PR-author-controlled content --
          # that path allows injection via the \'$'\'{{}}' evaluation layer before the shell sees the value.
          CHANGED_FILES="$(cat changed_files.txt 2>/dev/null || true)"
          DIFF="$(cat pr_truncated.diff 2>/dev/null || true)"

          MODEL="${GEMINI_MODEL:-gemini-1.5-pro}"

          PROMPT=$(cat <<'EOF'
          You are a senior application security engineer performing a pull request security review.

          Task:
          - Analyze the provided git diff and identify potential security issues, vulnerabilities, unsafe patterns, auth/session issues, injection risks, secrets leakage, SSRF, deserialization, crypto misuse, access control, insecure defaults, and supply-chain risks.
          - Be specific: reference filenames and the relevant added/modified lines (best-effort from the diff).
          - Assign severity: Critical/High/Medium/Low/Info.
          - Provide concrete remediation suggestions (code-level if possible).
          - If no significant issues, say so and list any minor hardening suggestions.

          Output format (Markdown):
          ## Summary
          ## Findings
          - [Severity] File: ... -- description + recommendation
          ## Suggested Tests
          ## Notes

          Changed files:
          EOF
          )
          PROMPT+="$CHANGED_FILES"
          PROMPT+=$'\n\nDiff:\n```diff\n'
          PROMPT+="$DIFF"
          PROMPT+=$'\n```\n'

          # Gemini API (AI Studio) endpoint.
          # Note: model naming can differ; keep GEMINI_MODEL configurable via secret.
          ENDPOINT="https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent"
          trap 'rm -f payload.json response.json' EXIT

          # Build request payload
          jq -n --arg prompt "$PROMPT" '{
            contents: [
              { role: "user", parts: [ { text: $prompt } ] }
            ],
            generationConfig: {
              temperature: 0.2,
              maxOutputTokens: 2048
            }
          }' > payload.json

          HTTP_STATUS=$(curl -sS -X POST \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: ${GEMINI_API_KEY}" \
            --data-binary @payload.json \
            -o response.json \
            -w "%{http_code}" \
            "$ENDPOINT")

          if [[ "$HTTP_STATUS" != "200" ]]; then
            echo "Gemini API returned HTTP ${HTTP_STATUS}"
            cat response.json
            exit 1
          fi

          TEXT=$(jq -r '.candidates[0].content.parts[0].text // empty' response.json)

          if [[ -z "$TEXT" ]]; then
            echo "No text returned. Raw response:"
            cat response.json
            exit 1
          fi

          {
            DELIM=$(uuidgen)
            echo "review<<${DELIM}"
            printf "%s\n" "$TEXT"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Post security review on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
        with:
          script: |
            // Read the review output from the GITHUB_OUTPUT file to avoid
            // expression interpolation of PR-author-controlled content (injection risk).
            const fs = require('fs');
            const outputFile = process.env.GITHUB_OUTPUT || '';
            let review = '';
            if (outputFile) {
              const raw = fs.readFileSync(outputFile, 'utf8');
              const match = raw.match(/^review<<([^\n]+)\n([\s\S]*?)\n\1$/m);
              if (match) review = match[2];
            }
            const hasCritical = review.includes('Critical');

            const body = [
              "## Automated Security Review (Gemini API)",
              "",
              review
            ].join("\n");

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: hasCritical ? 'REQUEST_CHANGES' : 'COMMENT',
              body
            });
