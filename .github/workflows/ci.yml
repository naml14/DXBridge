name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-version-docs:
    name: Check version markers in docs
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Verify version markers match version.txt
        shell: python3 {0}
        run: |
          import re, sys

          def read(path):
              return open(path, encoding="utf-8").read().replace("\r\n", "\n").replace("\r", "\n")

          version    = open("version.txt").read().strip()
          readme     = read("README.md")
          api_ref    = read("docs/api-reference.md")

          readme_match  = re.search(r'\| Current version \| `([0-9]+\.[0-9]+\.[0-9]+)`', readme)
          api_match     = re.search(r'- Current version: `([0-9]+\.[0-9]+\.[0-9]+)`', api_ref)

          readme_ver = readme_match.group(1) if readme_match else "<not found>"
          api_ver    = api_match.group(1)    if api_match    else "<not found>"

          print(f"version.txt:           {version}")
          print(f"README.md:             {readme_ver}")
          print(f"docs/api-reference.md: {api_ver}")

          fail = False
          if readme_ver != version:
              print(f"::error file=README.md,line=34::Version marker out of sync. Expected `{version}`, got `{readme_ver}`. Update README.md line 34.")
              fail = True
          if api_ver != version:
              print(f"::error file=docs/api-reference.md,line=8::Version marker out of sync. Expected `{version}`, got `{api_ver}`. Update docs/api-reference.md line 8.")
              fail = True
          if fail:
              print(f"\nOne or more version markers are out of sync with version.txt ({version}).")
              print("Update the listed files to match version.txt before merging.")
              sys.exit(1)

          print("All version markers are synchronized.")

  build:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install sccache
        uses: mozilla-actions/sccache-action@9e326ebed976843c9932b3aa0e021c6f50310eb4  # v0.0.9
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Configure sccache for MSVC
        shell: pwsh
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $env:GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $env:GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $env:GITHUB_ENV

      - name: Configure (CMake ci preset)
        shell: pwsh
        run: cmake --preset ci

      - name: Build (CMake ci preset)
        shell: pwsh
        run: cmake --build --preset ci

      - name: Verify synchronized version metadata
        shell: pwsh
        run: |
          try {
            .\scripts\verify-version.ps1 -Preset ci -Configuration Release
          } catch {
            $canonical = (Get-Content version.txt -Raw).Trim()
            $msg = "Version metadata is out of sync.`n" +
              "Expected version: $canonical`n`n" +
              "If README.md or docs/api-reference.md show an older version, update them:`n" +
              "README.md          -> '| Current version | ``$canonical`` |'`n" +
              "docs/api-reference.md -> '- Current version: ``$canonical``'`n" +
              "                   -> 'This page documents release ``$canonical``'`n`n" +
              "Run: .\scripts\verify-version.ps1 -SkipBinaryCheck to validate locally."
            Write-Error $msg
            exit 1
          }

      - name: Upload CI build tree
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: dxbridge-ci-tree-${{ github.sha }}
          path: out/build/ci
          retention-days: 7
          if-no-files-found: error

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: dxbridge-build-${{ github.sha }}
          path: |
            out/build/ci/Release/dxbridge.dll
            out/build/ci/Release/dxbridge.lib
          retention-days: 7
          if-no-files-found: error

  validate:
    needs: build
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download CI build tree
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dxbridge-ci-tree-${{ github.sha }}
          path: out/build/ci

      - name: Verify artifact extraction
        shell: pwsh
        run: |
          $dll = "out\build\ci\Release\dxbridge.dll"
          if (-not (Test-Path $dll)) {
            throw "Artifact extraction failed: '$dll' not found. The upload/download path structure may have changed."
          }
          Write-Host "Artifact verified: $dll ($([math]::Round((Get-Item $dll).Length / 1KB, 1)) KB)"

      - name: Run tests (CTest ci preset via PowerShell wrapper)
        shell: pwsh
        run: .\scripts\run-ctest.ps1 -Preset ci -Label "smoke|abi"

  validate-runtimes:
    needs: build
    runs-on: windows-2022
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        runtime: [nodejs, python, go, rust]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dxbridge-build-${{ github.sha }}
          path: out/build/ci/Release

      - name: Run runtime capability validation (${{ matrix.runtime }})
        shell: pwsh
        run: .\scripts\run-runtime-validation.ps1 -Dll .\out\build\ci\Release\dxbridge.dll -Runtime ${{ matrix.runtime }}

  abi-compat:
    needs: build
    runs-on: windows-2022
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dxbridge-build-${{ github.sha }}
          path: new-dll

      - name: Download baseline DLL from latest release
        id: baseline
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force "baseline-dll" | Out-Null

          Write-Host "Trying to download standalone baseline asset: dxbridge.dll"
          & gh release download --pattern "dxbridge.dll" --dir "baseline-dll"

          if ($LASTEXITCODE -eq 0 -and (Test-Path "baseline-dll\dxbridge.dll")) {
            Write-Host "Baseline ABI DLL downloaded directly from the latest release."
            exit 0
          }

          Write-Host "Standalone dxbridge.dll asset not found; falling back to the packaged release ZIP."

          New-Item -ItemType Directory -Force "baseline-zip" | Out-Null
          & gh release download --pattern "dxbridge-v*-win-x64.zip" --dir "baseline-zip"

          if ($LASTEXITCODE -ne 0) {
            throw "No compatible baseline asset found in the latest release (neither dxbridge.dll nor dxbridge-v*-win-x64.zip)."
          }

          $zip = Get-ChildItem "baseline-zip" -Filter "dxbridge-v*-win-x64.zip" | Select-Object -First 1
          if (-not $zip) {
            throw "Downloaded baseline ZIP was not found after gh release download completed."
          }

          $extractDir = "baseline-zip\expanded"
          Expand-Archive -Path $zip.FullName -DestinationPath $extractDir -Force

          $dll = Get-ChildItem $extractDir -Recurse -Filter "dxbridge.dll" | Select-Object -First 1
          if (-not $dll) {
            throw "Downloaded baseline ZIP does not contain dxbridge.dll."
          }

          Copy-Item $dll.FullName "baseline-dll\dxbridge.dll" -Force
          Write-Host "Baseline ABI DLL extracted from release ZIP."

      - name: Skip ABI check (no compatible baseline asset)
        if: steps.baseline.outcome != 'success'
        shell: bash
        run: |
          echo "No compatible baseline asset found in the latest release — skipping ABI comparison (first release or older release missing both standalone DLL and packaged ZIP)." | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Compare ABI exports
        if: steps.baseline.outcome == 'success'
        shell: pwsh
        run: |
          # Locate vcvars64.bat via vswhere
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"

          function Get-Exports {
            param([string]$DllPath)
            $raw = cmd /c "`"$vcvars`" >nul 2>&1 && dumpbin /EXPORTS `"$DllPath`""
            return $raw | Select-String 'DXBridge_' | ForEach-Object {
              ($_.Line.Trim() -split '\s+')[-1]
            } | Sort-Object -Unique
          }

          $oldExports = Get-Exports -DllPath "baseline-dll\dxbridge.dll"
          $newExports = Get-Exports -DllPath "new-dll\dxbridge.dll"

          $removed = $oldExports | Where-Object { $_ -notin $newExports }
          $added   = $newExports | Where-Object { $_ -notin $oldExports }

          $summary = @()
          $summary += "## ABI Compatibility Report"
          $summary += ""
          $summary += "| | Count |"
          $summary += "|---|---|"
          $summary += "| Symbols added | $($added.Count) |"
          $summary += "| Symbols removed | $($removed.Count) |"
          if ($added) {
            $summary += ""
            $summary += "### Added exports"
            $summary += ($added | ForEach-Object { "- ``$_``" })
          }
          if ($removed) {
            $summary += ""
            $summary += "### Removed exports (ABI BREAK)"
            $summary += ($removed | ForEach-Object { "- ``$_``" })
          }

          $summary -join "`n" | Add-Content -Path $env:GITHUB_STEP_SUMMARY

          if ($removed.Count -gt 0) {
            Write-Error "ABI BREAK: $($removed.Count) exported symbol(s) removed: $($removed -join ', ')"
            exit 1
          }

          Write-Host "ABI compatible. Added: $($added.Count), Removed: 0"
