name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (CMake ci preset)
        run: cmake --preset ci

      - name: Build (CMake ci preset)
        run: cmake --build --preset ci

      - name: Run tests (CTest ci preset)
        run: ctest --preset ci
