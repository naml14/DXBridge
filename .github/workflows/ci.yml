name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install sccache
        uses: mozilla-actions/sccache-action@9e326ebed976843c9932b3aa0e021c6f50310eb4  # v0.0.9
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Configure sccache for MSVC
        shell: pwsh
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $env:GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $env:GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $env:GITHUB_ENV

      - name: Configure (CMake ci preset)
        shell: pwsh
        run: cmake --preset ci

      - name: Build (CMake ci preset)
        shell: pwsh
        run: cmake --build --preset ci

      - name: Verify synchronized version metadata
        shell: pwsh
        run: |
          try {
            .\scripts\verify-version.ps1 -Preset ci -Configuration Release
          } catch {
            $canonical = (Get-Content version.txt -Raw).Trim()
            Write-Error @"
          Version metadata is out of sync.
          Expected version: $canonical

          If README.md or docs/api-reference.md show an older version, update them:
          README.md          -> '| Current version | ``$canonical`` |'
          docs/api-reference.md -> '- Current version: ``$canonical``'
                         -> 'This page documents release ``$canonical``'

          Run: .\scripts\verify-version.ps1 -SkipBinaryCheck  to validate locally.
          "@
            exit 1
          }

      - name: Upload CI build tree
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: dxbridge-ci-tree-${{ github.sha }}
          path: out/build/ci
          retention-days: 7
          if-no-files-found: error

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: dxbridge-build-${{ github.sha }}
          path: |
            out/build/ci/Release/dxbridge.dll
            out/build/ci/Release/dxbridge.lib
          retention-days: 7
          if-no-files-found: error

  validate:
    needs: build
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download CI build tree
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dxbridge-ci-tree-${{ github.sha }}
          path: .

      - name: Verify artifact extraction
        shell: pwsh
        run: |
          $dll = "out\build\ci\Release\dxbridge.dll"
          if (-not (Test-Path $dll)) {
            throw "Artifact extraction failed: '$dll' not found. The upload/download path structure may have changed."
          }
          Write-Host "Artifact verified: $dll ($([math]::Round((Get-Item $dll).Length / 1KB, 1)) KB)"

      - name: Run tests (CTest ci preset via PowerShell wrapper)
        shell: pwsh
        run: .\scripts\run-ctest.ps1 -Preset ci

      - name: Run runtime capability validation smoke
        shell: pwsh
        run: .\scripts\run-runtime-validation.ps1 -Dll .\out\build\ci\Release\dxbridge.dll
