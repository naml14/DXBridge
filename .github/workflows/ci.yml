name: CI

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (CMake ci preset)
        run: cmake --preset ci

      - name: Build (CMake ci preset)
        run: cmake --build --preset ci

      - name: Verify synchronized version metadata
        run: .\scripts\verify-version.ps1 -Preset ci -Configuration Release

      - name: Run tests (CTest ci preset via PowerShell wrapper)
        run: .\scripts\run-ctest.ps1 -Preset ci
